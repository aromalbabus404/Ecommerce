{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Response | FreshMart</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f8f8;
      color: #111;
      font-family: "Poppins", sans-serif;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      background-color: #fff;
    }

    .card-header {
      background-color: #111;
      color: #fff;
      text-align: center;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      padding: 1rem;
    }

    .form-label {
      font-weight: 500;
    }

    .btn-dark {
      background-color: #111;
      border: none;
      transition: all 0.3s ease-in-out;
    }

    .btn-dark:hover {
      background-color: #333;
    }

    .container {
      margin-top: 70px;
      max-width: 600px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h4>Send Response</h4>
      </div>
      <div class="card-body p-4">

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Responder Name</label>
            <input type="text" name="responder" class="form-control" placeholder="Enter your name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Response</label>
            <textarea name="response" rows="4" class="form-control" placeholder="Write your response here..." required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select" required>
              <option value="">-- Select Status --</option>
              <option value="Pending">Pending</option>
              <option value="Resolved">Resolved</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-dark">Submit Response</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
