{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Vegetables | FreshMart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      background: white;
    }
    .form-label {
      font-weight: 600;
      color: #333;
    }
    .btn-success {
      border-radius: 8px;
      font-weight: 600;
      padding: 10px 20px;
      transition: 0.3s;
    }
    .btn-success:hover {
      background-color: #157347;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">FreshMart</a>
    <a href="{% url 'shop' %}" class="btn btn-light btn-sm">Back to Shop</a>
  </div>
</nav>

<!-- Add Vegetable Form -->
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="text-center text-success mb-4">Add New Vegetable</h3>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Vegetable Image</label>
            <input type="file" name="image" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Vegetable Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter vegetable name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" name="price" class="form-control" placeholder="Enter price" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" placeholder="Enter stock quantity" min="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Weight (Kg)</label>
            <input type="text" name="kg" class="form-control" placeholder="Enter weight (e.g. 1 Kg)" required>
          </div>

          <div class="text-center mt-4">
            <button type="submit" class="btn btn-success w-100">Add Vegetable</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-light py-3 text-center mt-5">
  <p class="mb-0">&copy; 2025 FreshMart. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
