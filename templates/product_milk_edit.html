{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Milk Product | FreshMart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      font-family: "Poppins", sans-serif;
      color: #2b2b2b;
    }
    .card {
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      padding: 30px;
      margin-top: 50px;
    }
    .product-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn-primary {
      border-radius: 12px;
      padding: 10px 25px;
      font-weight: 600;
    }
    label {
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card mx-auto col-md-6">
    <h3 class="mb-4 text-center">Edit Milk Product</h3>

    <!-- Display current image -->
    <div class="text-center">
      {% if result.image %}
        <img src="{{ result.image.url }}" alt="{{ result.name }}" class="product-img">
      {% else %}
        <img src="{% static 'placeholder.png' %}" alt="No Image" class="product-img">
      {% endif %}
    </div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <label for="image" class="form-label">Change Image</label>
        <input type="file" name="image" id="image" class="form-control">
      </div>

      <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input type="text" name="name" id="name" class="form-control" value="{{ result.name }}" required>
      </div>

      <div class="mb-3">
        <label for="price" class="form-label">Price (₹)</label>
        <input type="number" name="price" id="price" class="form-control" value="{{ result.price }}" step="0.01" required>
      </div>

      <div class="mb-3">
        <label for="stock" class="form-label">Stock</label>
        <input type="number" name="stock" id="stock" class="form-control" value="{{ result.stock }}" min="0" required>
      </div>

      <div class="mb-3">
        <label for="litre" class="form-label">Litre</label>
        <input type="text" name="litre" id="litre" class="form-control" value="{{ result.litre }}" required>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-primary">Update Product</button>
        <a href="{% url 'staffhome' %}" class="btn btn-secondary ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
