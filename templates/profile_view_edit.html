{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile | FreshMart Monochrome Edition</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #111;
      --dark-gray: #222;
      --gray: #555;
      --light-gray: #ccc;
      --off-white: #f9f9f9;
      --white: #fff;
    }

    body {
      background: linear-gradient(180deg, #f5f5f5, #e5e5e5);
      font-family: 'Outfit', sans-serif;
      color: var(--black);
    }

    /* Navbar */
    .navbar {
      background: var(--black);
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
      padding: 0.8rem 1.2rem;
    }

    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--white) !important;
    }

    .nav-link {
      color: var(--off-white) !important;
      margin-left: 15px;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: var(--light-gray) !important;
    }

    /* Profile Edit Section */
    .profile-container {
      max-width: 700px;
      margin: 120px auto 50px;
      background: var(--white);
      border-radius: 25px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      padding: 40px;
      border: 1px solid var(--light-gray);
    }

    .profile-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--black);
      font-weight: 600;
    }

    .form-label {
      font-weight: 500;
      color: var(--black);
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid var(--light-gray);
    }

    .btn-submit {
      background: var(--black);
      color: var(--white);
      border-radius: 50px;
      padding: 10px 25px;
      border: none;
      transition: 0.3s ease;
      letter-spacing: 0.5px;
      margin-top: 20px;
    }

    .btn-submit:hover {
      background: var(--gray);
      transform: translateY(-2px);
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      color: var(--dark-gray);
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .back-btn:hover {
      color: var(--black);
      text-decoration: underline;
    }

    /* Footer */
    footer {
      background: var(--black);
      color: var(--white);
      text-align: center;
      padding: 30px 15px;
      margin-top: 60px;
      font-size: 0.95rem;
    }

    footer a {
      color: var(--light-gray);
      text-decoration: none;
      margin: 0 10px;
      transition: 0.3s;
    }

    footer a:hover {
      color: var(--white);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">🍃 FreshMart</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="complaint">Complaint</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Edit Profile Form -->
  <div class="container profile-container">
    <h2>Edit Profile</h2>
    <form method="POST">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input type="text" name="username" value="{{ result.username }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">First Name</label>
    <input type="text" name="firstname" value="{{ result.firstname }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Last Name</label>
    <input type="text" name="lastname" value="{{ result.lastname }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input type="text" name="phone" value="{{ result.phone }}" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-submit">Save Changes</button>
  <a href="{% url 'profile_view' %}" class="back-btn">← Back to Profile</a>
</form>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2025 FreshMart. All rights reserved.</p>
    <div>
      <a href="/">Home</a> |
      <a href="shop">Shop</a> |
      <a href="about">About</a> |
      <a href="contact">Contact</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
