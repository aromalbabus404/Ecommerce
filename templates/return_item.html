{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return Product - FreshMart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background: #1f1f1f;
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 600;
        }

        .return-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
            padding: 30px;
            margin-top: 60px;
        }

        .card-header {
            font-size: 22px;
            font-weight: 600;
            color: #ff7f50;
            margin-bottom: 25px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: #ff7f50;
            border: none;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background: #e96a3f;
        }

        .btn-cancel {
            text-decoration: none;
            color: #6c757d;
            margin-left: 15px;
        }

        .btn-cancel:hover {
            color: #ff7f50;
        }

        footer {
            background: #1f1f1f;
            color: #fff;
            padding: 20px 0;
            margin-top: 80px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">FreshMart</a>
        <a href="{% url 'orders' %}" class="btn btn-outline-secondary ms-2">
    ← Back to Orders
</a>

    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="return-card">

                <div class="card-header">
                    🔄 Return Product
                </div>

                <div class="info-box">
                    <p><strong>Order ID:</strong> #{{ item.ORDER.id }}</p>
                    <p><strong>Quantity:</strong> {{ item.quantity }}</p>
                    <p><strong>Price:</strong> ₹{{ item.price }}</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Reason for Return</label>
                        <textarea name="reason" class="form-control" rows="4" placeholder="Please explain why you want to return this item..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Submit Return Request
                    </button>

                    <a href="{% url 'orders' %}" class="btn-cancel">
                        Cancel
                    </a>

                </form>

            </div>

        </div>
    </div>
</div>

<footer class="text-center">
    <div class="container">
        © 2025 FreshMart. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
