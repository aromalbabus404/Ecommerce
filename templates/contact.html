{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact FreshMart | Get in Touch</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #000;
      --secondary: #1a1a1a;
      --accent: #ffffff;
      --muted: #cccccc;
      --light-bg: #f8f8f8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--light-bg);
      color: var(--primary);
    }

    /* 🌿 Navbar */
    .navbar {
      background: var(--primary);
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
      padding: 0.8rem 1.2rem;
    }

    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent) !important;
    }

    .nav-link {
      color: var(--accent) !important;
      margin-left: 15px;
      font-weight: 500;
    }

    .nav-link:hover {
      color: var(--muted) !important;
    }

    .nav-link.active {
      border-bottom: 2px solid var(--accent);
    }

    .nav-link.dropdown-toggle::after { display: none !important; }

    .dropdown-menu {
      background: #111;
      border: none;
      border-radius: 10px;
    }

    .dropdown-item {
      color: #f1f1f1;
    }

    .dropdown-item:hover {
      background: var(--accent);
      color: var(--primary);
    }

    /* 📞 Contact Section */
    .contact-section {
      padding: 120px 0;
      background: #fff;
    }

    .contact-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      text-align: center;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 40px;
    }

    .contact-info {
      max-width: 800px;
      margin: 0 auto;
      background: var(--light-bg);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .contact-info i {
      font-size: 2rem;
      margin-bottom: 15px;
      color: var(--primary);
    }

    .contact-info h5 {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .contact-info p {
      color: var(--secondary);
      margin-bottom: 20px;
    }

    /* 📩 Contact Form */
    .contact-form {
      max-width: 800px;
      margin: 50px auto 0;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 12px;
    }

    .btn-send {
      background: var(--primary);
      color: var(--accent);
      border-radius: 50px;
      padding: 12px 30px;
      transition: 0.3s ease;
      border: none;
      font-weight: 600;
    }

    .btn-send:hover {
      background: #333;
      transform: scale(1.05);
    }

    /* 🌿 Footer */
    .footer {
      background: var(--primary);
      color: #fff;
      padding: 50px 0;
      margin-top: 100px;
    }

    .footer a {
      color: #fff;
      text-decoration: none;
      opacity: 0.9;
    }

    .footer a:hover {
      opacity: 1;
      text-decoration: underline;
    }
    /* Floating animation */
  .social-icon:hover {
    transform: translateY(-8px) scale(1.15);
    color: #0d6efd;
  }

  .whatsapp-small {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    z-index: 9999;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
    animation: pulse 1.5s infinite ease-in-out;
    transition: 0.3s;
}

@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
    }
    50% {
        transform: scale(1.08);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
    }
}

.whatsapp-small:hover {
    transform: scale(1.15);
}
.instagram-small {
    position: fixed;
    bottom: 80px; /* placed above WhatsApp icon */
    right: 20px;
    width: 48px;
    height: 48px;
    background: radial-gradient(circle at 30% 30%, #fdf497, #fd5949, #d6249f, #285AEB);
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    z-index: 9999;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(255, 0, 122, 0.4);
    animation: pulseInst 1.5s infinite ease-in-out;
    transition: 0.3s;
}

@keyframes pulseInst {
    0% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(255, 0, 122, 0.4);
    }
    50% {
        transform: scale(1.08);
        box-shadow: 0 0 20px rgba(255, 0, 122, 0.6);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(255, 0, 122, 0.4);
    }
}

.instagram-small:hover {
    transform: scale(1.15);
}
  </style>
</head>
