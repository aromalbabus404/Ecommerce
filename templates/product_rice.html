{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Rice Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Add Rice Product</h2>

    <form action="" method="POST" enctype="multipart/form-data" class="border p-4 shadow rounded">
        {% csrf_token %}

        <!-- Image Upload -->
        <div class="mb-3">
            <label class="form-label">Rice Image</label>
            <input type="file" name="image" class="form-control" required>
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Rice Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter rice name" required>
        </div>

        <!-- Stock -->
        <div class="mb-3">
            <label class="form-label">Stock (kg)</label>
            <input type="number" name="stock" class="form-control" value="0" required>
        </div>

        <!-- KG -->
        <div class="mb-3">
            <label class="form-label">Quantity Type</label>
            <input type="text" name="kg" class="form-control" value="kg" required>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" name="price" class="form-control" required>
        </div>

        <!-- Submit -->
        <button class="btn btn-dark w-100">Add Product</button>
    </form>
</div>

</body>
</html>
