<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Registration | FreshMart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0a0a0a, #151515);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-box {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 2.5rem;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 0 25px rgba(0,255,179,0.15);
      animation: fadeInUp 1s ease;
    }

    .register-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 2px;
      background: linear-gradient(45deg, #00ffb3, #0077ff, #00ffb3);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      pointer-events: none;
    }

    h3 {
      text-align: center;
      font-weight: 700;
      color: #00ffb3;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 8px rgba(0,255,179,0.5);
    }

    .form-label {
      color: #ddd;
      font-size: 0.9rem;
    }

    .form-control {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      transition: 0.3s;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .form-control:focus {
      background: rgba(255,255,255,0.12);
      outline: none;
      box-shadow: 0 0 10px rgba(0,255,179,0.3);
    }

    .btn-register {
      width: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #00ffb3, #0077ff);
      color: #000;
      font-weight: 700;
      border: none;
      padding: 12px;
      margin-top: 10px;
      transition: all 0.3s;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0,255,179,0.5);
    }

    .text-link {
      text-align: center;
      margin-top: 15px;
      color: #ccc;
      font-size: 0.9rem;
    }

    .text-link a {
      color: #00ffb3;
      font-weight: 600;
      text-decoration: none;
    }

    .text-link a:hover {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(40px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 600px) {
      .register-box {
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="register-box">
    <h3><i class="bi bi-person-plus-fill me-2"></i>Create Your Account</h3>
    <form method="POST" action="">
      {% csrf_token %}

      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="firstname" class="form-label">First Name</label>
          <input type="text" id="firstname" name="firstname" class="form-control" placeholder="Enter first name" required>
        </div>
        <div class="col-md-6 mb-3">
          <label for="lastname" class="form-label">Last Name</label>
          <input type="text" id="lastname" name="lastname" class="form-control" placeholder="Enter last name" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="example@gmail.com" required>
      </div>

      <div class="mb-3">
  <label for="phone" class="form-label">Phone Number</label>
  <input
    type="tel"
    id="phone"
    name="phone"
    class="form-control"
    placeholder="Enter 10-digit mobile number"
    required
    pattern="[6-9][0-9]{9}"
    maxlength="10"
    title="Enter a valid 10-digit Indian mobile number starting with 6-9"
  >
</div>


        <div class="mb-4" style="position: relative;">
  <label for="password" class="form-label">Password</label>

  <input
    type="password"
    id="password"
    name="password"
    class="form-control pe-5"
    placeholder="Ex: Abc@123"
    required
    minlength="6"
    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*#?&]).{6,}"
    title="Password must contain at least:
• 1 uppercase letter
• 1 lowercase letter
• 1 number
• 1 special character"
  >

  <!-- Eye Icon -->
  <i
    class="bi bi-eye-fill mt-3"
    id="togglePassword"
    style="
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #00ffb3;
      font-size: 1.2rem;
    ">
  </i>
</div>

      <button type="submit" class="btn-register">Register</button>

      <div class="text-link">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
      </div>
    </form>
  </div>

  <script>
  const phoneInput = document.getElementById("phone");

  phoneInput.addEventListener("input", function () {
    // Allow only numbers
    this.value = this.value.replace(/[^0-9]/g, "");

    // Limit to 10 digits
    if (this.value.length > 10) {
      this.value = this.value.slice(0, 10);
    }
  });
</script>


  <script>
  const togglePassword = document.getElementById("togglePassword");
  const passwordField = document.getElementById("password");

  togglePassword.addEventListener("click", function () {
    const type =
      passwordField.getAttribute("type") === "password"
        ? "text"
        : "password";
    passwordField.setAttribute("type", type);

    this.classList.toggle("bi-eye-fill");
    this.classList.toggle("bi-eye-slash-fill");
  });
</script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
