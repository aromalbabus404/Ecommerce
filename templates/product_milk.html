{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Milk Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f7f7f7;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            max-width: 600px;
        }
        .form-box {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.15);
            margin-top: 50px;
        }
        .form-label {
            font-weight: 600;
        }
        .btn-dark {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-box">
        <h3 class="text-center mb-4">Add Milk Product</h3>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Image Upload -->
            <div class="mb-3">
                <label class="form-label">Milk Image</label>
                <input type="file" name="image" class="form-control" required>
            </div>

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Milk Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter milk name" required>
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <label class="form-label">Stock (Quantity)</label>
                <input type="number" name="stock" class="form-control" value="0" required>
            </div>

            <!-- Litre -->
            <div class="mb-3">
                <label class="form-label">Quantity Type</label>
                <input type="text" name="litre" class="form-control" value="litre" required>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" name="price" class="form-control" placeholder="Enter price" required>
            </div>

            <button class="btn btn-dark w-100">Add Product</button>
        </form>
    </div>
</div>

</body>
</html>
