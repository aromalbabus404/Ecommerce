{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Registration | FreshMart Monochrome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #111;
      --dark-gray: #222;
      --gray: #555;
      --light-gray: #ccc;
      --off-white: #f9f9f9;
      --white: #fff;
    }

    body {
      background: linear-gradient(180deg, #f5f5f5, #e5e5e5);
      font-family: 'Outfit', sans-serif;
      color: var(--black);
    }

    .navbar {
      background: var(--black);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .navbar-brand {
      color: var(--white) !important;
      font-weight: 700;
      font-size: 1.8rem;
    }
    .nav-link {
      color: var(--off-white) !important;
      margin-left: 15px;
      transition: 0.3s;
    }
    .nav-link:hover {
      color: var(--light-gray) !important;
    }

    .register-container {
      max-width: 700px;
      margin: 120px auto 50px;
      background: var(--white);
      border-radius: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      padding: 40px;
      border: 1px solid var(--light-gray);
    }

    .register-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--black);
      font-weight: 600;
    }

    .form-label {
      font-weight: 500;
      color: var(--black);
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid var(--light-gray);
    }

    .btn-submit {
      background: var(--black);
      color: var(--white);
      border-radius: 50px;
      padding: 10px 25px;
      border: none;
      transition: 0.3s ease;
      letter-spacing: 0.5px;
      margin-top: 20px;
    }

    .btn-submit:hover {
      background: var(--gray);
      transform: translateY(-2px);
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      color: var(--dark-gray);
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .back-btn:hover {
      color: var(--black);
      text-decoration: underline;
    }

    footer {
      background: var(--black);
      color: var(--white);
      text-align: center;
      padding: 30px 15px;
      margin-top: 60px;
      font-size: 0.95rem;
    }
    footer a {
      color: var(--light-gray);
      text-decoration: none;
      margin: 0 10px;
      transition: 0.3s;
    }
    footer a:hover {
      color: var(--white);
    }
  </style>
</head>

<body>
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🍃 FreshMart</a>
    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="staffhome">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="logout">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container register-container">
  <h2>Staff Registration</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">First Name</label>
      <input type="text" name="firstname" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Last Name</label>
      <input type="text" name="lastname" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Date of Birth</label>
      <input type="date" name="dob" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-submit">Register</button>
    <a href="{% url 'staff_admin_view' %}" class="back-btn">← Back to Staff List</a>
  </form>
</div>

<footer>
  <p>© 2025 FreshMart. All rights reserved.</p>
  <div>
    <a href="/">Home</a> |
    <a href="shop">Shop</a> |
    <a href="about">About</a> |
    <a href="contact">Contact</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
