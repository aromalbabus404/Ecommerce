{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | FreshMart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom right, #f8fafc, #eef1f5);
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR - FreshMart premium black/white */
        .navbar {
            background: #1a1a1a;
            padding: 12px 0;
        }
        .navbar-brand {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff !important;
        }
        .nav-link {
            color: #dcdcdc !important;
            font-weight: 500;
            margin-left: 15px;
        }
        .nav-link:hover {
            color: #ffffff !important;
        }

        /* SUCCESS CARD */
        .success-wrapper {
            margin-top: 80px;
            margin-bottom: 121px;
        }

        .success-card {
            max-width: 550px;
            margin: auto;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 1s ease-out;
        }

        /* SUCCESS ANIMATION */
        .checkmark {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #28a745;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.6s ease-out;
        }

        .checkmark i {
            color: white;
            font-size: 50px;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-card h1 {
            font-size: 36px;
            font-weight: 700;
            margin-top: 20px;
            color: #1a1a1a;
        }

        .success-card p {
            font-size: 18px;
            color: #555;
        }

        .btn-shop {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
        }

        /* FOOTER - FreshMart black */
        footer {
            background: #1a1a1a;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .delivery-badge{
            background:#ffe272;
            padding:8px 14px;
            border-radius:30px;
            font-weight:600;
            display:inline-block;
            margin-top:12px;
            color:#000;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">FreshMart</a>
    <div>
        <a class="nav-link d-inline-block" href="/">Home</a>
        <a class="nav-link d-inline-block" href="{% url 'shop' %}">Shop</a>
        <a class="nav-link d-inline-block" href="/orders">Orders</a>
    </div>
  </div>
</nav>

<!-- SUCCESS BODY -->
<div class="success-wrapper">
    <div class="success-card">

        <div class="checkmark">
            <i class="bi bi-check2"></i>
        </div>

        <h1>Order Successful!</h1>
        <p>Your order has been placed successfully.  
        Thank you for choosing FreshMart.<br>
        <span class="delivery-badge">🚚 Delivery Time: 2 Hours</span>
        </p>

        <a href="{% url 'shop' %}" class="btn btn-dark btn-shop">Continue Shopping</a>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © {{ year }} FreshMart • Premium Grocery Delivery
</footer>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</body>
</html>
