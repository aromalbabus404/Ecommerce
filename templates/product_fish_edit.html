{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Fish Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Edit Fish Product</h2>

    <form action="" method="POST" enctype="multipart/form-data" class="border p-4 shadow rounded">
        {% csrf_token %}

        <!-- Current Image -->
        <div class="mb-3 text-center">
            <label class="form-label fw-bold">Current Image</label><br>
            <img src="{{ result.image.url }}" width="150" height="150" class="rounded shadow">
        </div>

        <!-- Change Image -->
        <div class="mb-3">
            <label class="form-label">Change Image (optional)</label>
            <input type="file" name="image" class="form-control">
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Fish Name</label>
            <input type="text" name="name" class="form-control" value="{{ result.name }}" required>
        </div>

        <!-- Stock -->
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ result.stock }}" required>
        </div>

        <!-- KG -->
        <div class="mb-3">
            <label class="form-label">Quantity (kg)</label>
            <input type="text" name="kg" class="form-control" value="{{ result.kg }}" required>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" name="price" class="form-control" value="{{ result.price }}" required>
        </div>

        <button class="btn btn-dark w-100">Update Product</button>
    </form>
</div>

</body>
</html>
